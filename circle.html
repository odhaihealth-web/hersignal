<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    --bg-start: #1a0a2e;
    --bg-end: #0f0a1e;
    --teal: #00d4aa;
    --purple: #7c3aed;
    --lavender: #c4b5fd;
    --glass: rgba(45,27,78,0.6);
    --border: rgba(124,58,237,0.3);
    --white: #ffffff;
    --muted: #a78bfa;
    --online: #22c55e;
    --companion-bg: rgba(0,212,170,0.12);
    --companion-border: rgba(0,212,170,0.35);
    --user-bg: rgba(124,58,237,0.25);
    --user-border: rgba(124,58,237,0.5);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
  body {
    background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
    color: var(--white);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #app {
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #splash {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    background: linear-gradient(180deg, #1a0a2e 0%, #0f0a1e 100%);
    transition: opacity 0.6s ease, visibility 0.6s ease;
    padding: 24px 20px 32px;
    overflow-y: auto;
  }
  #splash.hidden-splash {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .splash-img-wrap {
    width: 100%;
    max-height: 55vh;
    background: #1a0a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .splash-img-wrap img {
    width: 100%;
    height: 100%;
    max-height: 55vh;
    object-fit: contain;
    display: block;
  }
  .splash-brand {
    text-align: center;
    margin-bottom: 8px;
  }
  .splash-brand .hersignal {
    color: #00d4aa;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .splash-brand .circle {
    color: #c4b5fd;
    font-size: 18px;
    font-weight: 500;
    margin-left: 6px;
  }
  .splash-tagline {
    color: #ffffff;
    font-size: 14px;
    font-style: italic;
    text-align: center;
    margin-bottom: 28px;
    opacity: 0.9;
  }
  .enter-btn {
    width: 200px;
    height: 52px;
    border-radius: 9999px;
    background: #00d4aa;
    color: #0f0a1e;
    font-size: 16px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
    flex-shrink: 0;
  }
  .enter-btn:active { transform: scale(0.97); }
  .enter-btn:hover { box-shadow: 0 0 20px rgba(0,212,170,0.35); }

  /* Chat UI */
  #chat-ui {
    display: flex;
    flex-direction: column;
    height: 100%;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #chat-ui.visible { opacity: 1; }

  /* Header */
  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(26,10,46,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  .header-logo {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .header-logo .hersignal { color: var(--teal); font-size: 18px; font-weight: 700; }
  .header-logo .circle { color: var(--lavender); font-size: 14px; font-weight: 500; }
  .online-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,212,170,0.15);
    border: 1px solid rgba(0,212,170,0.35);
    border-radius: 9999px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--teal);
  }
  .online-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--online);
    box-shadow: 0 0 6px var(--online);
    flex-shrink: 0;
  }

  /* Companion row */
  .companion-row {
    display: flex;
    gap: 14px;
    padding: 12px 16px;
    overflow-x: auto;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .companion-row::-webkit-scrollbar { display: none; }
  .companion-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .companion-avatar-wrap {
    position: relative;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--teal);
    background: #2a1a4a;
  }
  .companion-avatar-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .companion-online {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--online);
    border: 2px solid #1a0a2e;
    box-shadow: 0 0 4px var(--online);
  }
  .companion-name {
    font-size: 11px;
    color: var(--lavender);
    font-weight: 500;
    white-space: nowrap;
  }

  /* Topic row */
  .topic-row {
    display: flex;
    gap: 10px;
    padding: 10px 16px;
    overflow-x: auto;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .topic-row::-webkit-scrollbar { display: none; }
  .topic-card {
    min-width: 110px;
    flex-shrink: 0;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }
  .topic-card:hover { border-color: rgba(124,58,237,0.6); background: rgba(45,27,78,0.8); }
  .topic-card.active {
    border-color: var(--teal);
    background: rgba(0,212,170,0.15);
    box-shadow: 0 0 12px rgba(0,212,170,0.15);
  }
  .topic-emoji { font-size: 20px; display: block; margin-bottom: 4px; }
  .topic-label { font-size: 12px; font-weight: 600; color: var(--white); white-space: nowrap; }

  /* Messages */
  .messages-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: thin;
    scrollbar-color: var(--purple) transparent;
  }
  .messages-wrap::-webkit-scrollbar { width: 4px; }
  .messages-wrap::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 4px; }
  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: msgIn 0.3s ease both;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: #2a1a4a;
    border: 1.5px solid var(--border);
  }
  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .msg-body { display: flex; flex-direction: column; gap: 2px; max-width: 78%; }
  .msg-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--lavender);
    margin-left: 4px;
  }
  .msg-bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.45;
    word-break: break-word;
  }
  .msg-bubble.companion {
    background: var(--companion-bg);
    border: 1px solid var(--companion-border);
    color: #e0f2fe;
    border-bottom-left-radius: 4px;
  }
  .msg-bubble.user {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
    color: #f3e8ff;
    border-bottom-right-radius: 4px;
  }
  .msg-row.self { flex-direction: row-reverse; }
  .msg-row.self .msg-name { margin-left: 0; margin-right: 4px; text-align: right; }

  /* Input */
  .input-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 10px 16px 16px;
    background: rgba(26,10,46,0.85);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-bar input {
    flex: 1;
    background: rgba(45,27,78,0.6);
    border: 1px solid var(--border);
    border-radius: 9999px;
    padding: 11px 16px;
    color: var(--white);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s ease;
  }
  .input-bar input::placeholder { color: var(--muted); }
  .input-bar input:focus { border-color: var(--teal); }
  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--teal);
    border: none;
    color: #0f0a1e;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s ease;
  }
  .send-btn:active { transform: scale(0.92); }

  /* Typing indicator */
  .typing-row { display: flex; gap: 10px; align-items: flex-end; opacity: 0.7; }
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--teal);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* Scroll to bottom helper */
  .scroll-bottom {
    position: absolute;
    bottom: 76px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--glass);
    border: 1px solid var(--border);
    color: var(--teal);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 5;
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .scroll-bottom.show { opacity: 1; }
</style>
</head>

  let realtimeSub = null;
  let onlineTimer = null;
  let firstVisit = false;

  // DOM refs
  const splash = document.getElementById('splash');
  const chatUi = document.getElementById('chat-ui');
  const enterBtn = document.getElementById('enterBtn');
  const companionRow = document.getElementById('companionRow');
  const topicRow = document.getElementById('topicRow');
  const messagesWrap = document.getElementById('messagesWrap');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const onlineText = document.getElementById('onlineText');
  const scrollBottom = document.getElementById('scrollBottom');

  // Helpers
  function generateHandle() {
    const word = NATURE_WORDS[Math.floor(Math.random() * NATURE_WORDS.length)];
    const num = Math.floor(Math.random() * 90) + 10;
    return word + num;
  }

  function getOrCreateHandle() {
    let h = localStorage.getItem('hs_circle_handle');
    if (!h) {
      h = generateHandle();
      localStorage.setItem('hs_circle_handle', h);
    }
    return h;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function isGreeting(text) {
    return /^(hi|hey|hello|hola|good morning|good evening)\b/i.test(text.trim());
  }

  function scrollToBottom() {
    messagesWrap.scrollTop = messagesWrap.scrollHeight;
  }

  function showScrollBtn() {
    const nearBottom = messagesWrap.scrollHeight - messagesWrap.scrollTop - messagesWrap.clientHeight < 60;
    scrollBottom.classList.toggle('show', !nearBottom);
  }

  // Build companion row
  function buildCompanions() {
    companionRow.innerHTML = '';
    COMPANIONS.forEach(c => {
      const el = document.createElement('div');
      el.className = 'companion-item';
      el.innerHTML = `
        <div class="companion-avatar-wrap">
          <img src="${c.img}" alt="${c.name}" loading="eager" />
          <span class="companion-online"></span>
        </div>
        <span class="companion-name">${c.name}</span>
      `;
      companionRow.appendChild(el);
    });
  }

  // Build topic row
  function buildTopics() {
    topicRow.innerHTML = '';
    TOPICS.forEach(t => {
      const el = document.createElement('div');
      el.className = 'topic-card' + (t.key === currentTopic ? ' active' : '');
      el.dataset.key = t.key;
      el.innerHTML = `<span class="topic-emoji">${t.emoji}</span><span class="topic-label">${t.label}</span>`;
      el.addEventListener('click', () => switchTopic(t.key));
      topicRow.appendChild(el);
    });
  }

  // Render a message
  function renderMessage(msg, prepend = false) {
    const isCompanion = !!msg.is_companion;
    const isSelf = !isCompanion && msg.handle === myHandle;
    const companion = isCompanion ? COMPANIONS.find(c => c.name === msg.handle) : null;
    const avatarUrl = companion ? companion.img : '';

    const row = document.createElement('div');
    row.className = 'msg-row' + (isSelf ? ' self' : '');

    let avatarHtml = '';
    if (isCompanion) {
      avatarHtml = `<div class="msg-avatar"><img src="${avatarUrl}" alt="${msg.handle}" /></div>`;
    } else {
      const initial = (msg.handle || '?').charAt(0).toUpperCase();
      const hue = (msg.handle || '').split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 360;
      avatarHtml = `<div class="msg-avatar" style="background:hsl(${hue},60%,35%);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;border-color:var(--border);">${initial}</div>`;
    }

    row.innerHTML = `
      ${avatarHtml}
      <div class="msg-body">
        <div class="msg-name">${escapeHtml(msg.handle || 'Unknown')}</div>
        <div class="msg-bubble ${isCompanion ? 'companion' : 'user'}">${escapeHtml(msg.message || '')}</div>
      </div>
    `;

    if (prepend) {
      messagesWrap.insertBefore(row, messagesWrap.firstChild);
    } else {
      messagesWrap.appendChild(row);
    }
  }

  // Show typing indicator
  function showTyping(handle) {
    const companion = COMPANIONS.find(c => c.name === handle);
    const row = document.createElement('div');
    row.className = 'msg-row typing-row';
    row.id = 'typing-' + handle;
    row.innerHTML = `
      <div class="msg-avatar"><img src="${companion.img}" alt="${handle}" /></div>
      <div class="msg-body">
        <div class="msg-name">${handle}</div>
        <div class="msg-bubble companion typing-dots"><span></span><span></span><span></span></div>
      </div>
    `;
    messagesWrap.appendChild(row);
    scrollToBottom();
  }

  function removeTyping(handle) {
    const el = document.getElementById('typing-' + handle);
    if (el) el.remove();
  }

  // Load messages
  async function loadMessages(topic) {
    messagesWrap.innerHTML = '';
    if (!supabase) return;

    try {
      const twoHoursAgo = new Date(Date.now() - 2 * 60 * 60 * 1000).toISOString();
      const { data, error } = await supabase
        .from('circle_messages')
        .select('*')
        .eq('topic', topic)
        .gte('created_at', twoHoursAgo)
        .order('created_at', { ascending: true })
        .limit(50);

      if (error) {
        console.warn('Supabase load error:', error);
        showSeedMessages(topic);
        return;
      }

      if (!data || data.length === 0) {
        showSeedMessages(topic);
      } else {
        data.forEach(m => renderMessage(m));
        scrollToBottom();
      }
    } catch (e) {
      console.warn('Load failed:', e);
      showSeedMessages(topic);
    }
  }

  function showSeedMessages(topic) {
    const seeds = SEED_MESSAGES[topic] || [];
    seeds.forEach((s, i) => {
      setTimeout(() => {
        renderMessage({ handle: s.handle, message: s.msg, is_companion: true });
        scrollToBottom();
      }, i * 350);
    });
  }

  // Send message
  async function sendMessage(text) {
    const t = text.trim();
    if (!t) return;
    msgInput.value = '';

    const msg = { topic: currentTopic, handle: myHandle, message: t, is_companion: false, created_at: new Date().toISOString() };
    renderMessage(msg);
    scrollToBottom();

    // Store locally for offline resilience
    try {
      const stored = JSON.parse(localStorage.getItem('hs_circle_local') || '[]');
      stored.push(msg);
      if (stored.length > 200) stored.shift();
      localStorage.setItem('hs_circle_local', JSON.stringify(stored));
    } catch(e) {}

    // Supabase insert
    if (supabase) {
      try {
        await supabase.from('circle_messages').insert([{ topic: currentTopic, handle: myHandle, message: t, is_companion: false }]);
      } catch (e) {
        console.warn('Send failed:', e);
      }
    }

    // Greeting detection
    if (isGreeting(t)) {
      triggerCompanionGreetings();
    }
  }

  // Companion greetings
  function triggerCompanionGreetings() {
    COMPANIONS.forEach((c, i) => {
      setTimeout(() => {
        showTyping(c.name);
        setTimeout(() => {
          removeTyping(c.name);
          const responses = GREETING_RESPONSES[c.name];
          const r = responses[Math.floor(Math.random() * responses.length)];
          const msg = { handle: c.name, message: r, is_companion: true, created_at: new Date().toISOString() };
          renderMessage(msg);
          scrollToBottom();
          if (supabase) {
            supabase.from('circle_messages').insert([{ topic: currentTopic, handle: c.name, message: r, is_companion: true }]).catch(()=>{});
          }
        }, 1200 + Math.random() * 600);
      }, i * 1800);
    });
  }

  // Auto welcome (first visit only)
  function autoWelcome() {
    if (!firstVisit) return;
    setTimeout(() => {
      showTyping('Maya');
      setTimeout(() => {
        removeTyping('Maya');
        const msg = { handle: 'Maya', message: "Welcome to the Circle! I'm Maya. Whatever brought you here today — you're safe to share or just listen. 💚", is_companion: true, created_at: new Date().toISOString() };
        renderMessage(msg);
        scrollToBottom();
        if (supabase) supabase.from('circle_messages').insert([{ topic: currentTopic, handle: 'Maya', message: msg.message, is_companion: true }]).catch(()=>{});
      }, 1400);
    }, 2000);

    setTimeout(() => {
      showTyping('Nia');
      setTimeout(() => {
        removeTyping('Nia');
        const msg = { handle: 'Nia', message: "Hi! I'm Nia. If you're dealing with symptoms and wondering what's normal — ask anything. No judgment, just facts and support.", is_companion: true, created_at: new Date().toISOString() };
        renderMessage(msg);
        scrollToBottom();
        if (supabase) supabase.from('circle_messages').insert([{ topic: currentTopic, handle: 'Nia', message: msg.message, is_companion: true }]).catch(()=>{});
      }, 1400);
    }, 4500);
  }

  // Online count
  async function updateOnlineCount() {
    if (!supabase) {
      onlineText.textContent = 'Be the first';
      return;
    }
    try {
      const twoHoursAgo = new Date(Date.now() - 2 * 60 * 60 * 1000).toISOString();
      const { data, error } = await supabase
        .from('circle_messages')
        .select('handle')
        .eq('topic', currentTopic)
        .eq('is_companion', false)
        .gte('created_at', twoHoursAgo);

      if (error) {
        onlineText.textContent = 'Be the first';
        return;
      }
      const unique = new Set((data || []).map(d => d.handle));
      const count = unique.size;
      onlineText.textContent = count === 0 ? 'Be the first' : (count + ' women online');
    } catch (e) {
      onlineText.textContent = 'Be the first';
    }
  }

  // Realtime subscription
  function subscribeRealtime() {
    if (!supabase) return;
    if (realtimeSub) { realtimeSub.unsubscribe(); realtimeSub = null; }
    realtimeSub = supabase
      .channel('circle_messages:' + currentTopic)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'circle_messages',
        filter: 'topic=eq.' + currentTopic
      }, payload => {
        const m = payload.new;
        if (m.handle === myHandle && !m.is_companion) return; // already rendered locally
        renderMessage(m);
        scrollToBottom();
      })
      .subscribe();
  }

  // Switch topic
  async function switchTopic(key) {
    currentTopic = key;
    buildTopics();
    await loadMessages(key);
    updateOnlineCount();
    subscribeRealtime();
  }

  // Enter the Circle
  async function enterCircle() {
    splash.classList.add('hidden-splash');
    chatUi.classList.add('visible');
    sessionStorage.setItem('hs_circle_visited', '1');

    myHandle = getOrCreateHandle();
    buildCompanions();
    buildTopics();

    // Init Supabase
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } catch (e) {
      console.warn('Supabase init failed:', e);
      supabase = null;
    }

    await loadMessages(currentTopic);
    updateOnlineCount();
    subscribeRealtime();

    onlineTimer = setInterval(updateOnlineCount, 60000);

    autoWelcome();
  }

  // Event bindings
  enterBtn.addEventListener('click', enterCircle);

  sendBtn.addEventListener('click', () => sendMessage(msgInput.value));
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage(msgInput.value);
  });

  messagesWrap.addEventListener('scroll', showScrollBtn);
  scrollBottom.addEventListener('click', scrollToBottom);

  // Splash skip for return visits
  if (sessionStorage.getItem('hs_circle_visited')) {
    enterCircle();
  }
})();
</script>
</body>
</html>
